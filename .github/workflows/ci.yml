name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs of the same PR/branch to save minutes
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.6.5"

permissions:
  contents: read

jobs:
  # ───────── Lint + format check ─────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Biome check
        run: pnpm lint

  # ───────── Typecheck across all workspaces ─────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Generate Drizzle migrations (idempotent)
        run: pnpm db:generate
      - name: Typecheck
        run: pnpm typecheck

  # ───────── Sidecar bundle build ─────────
  # Guarantees the sidecar can be packaged as the .cjs bundle Tauri ships.
  # Catches issues invisible to tsc (esbuild externals, native addon copy,
  # migrations folder sync, etc).
  sidecar-bundle:
    name: Sidecar bundle build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build sidecar bundle
        run: pnpm --filter @tortuga/sidecar build

  # ───────── Tests ─────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test

  # ───────── Dependency audit ─────────
  audit:
    name: pnpm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install deps (frozen)
        run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level=high

  # ───────── Secret scanning ─────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
