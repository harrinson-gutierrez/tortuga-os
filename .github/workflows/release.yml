name: Release

# Cuts a signed Tortuga OS release on tag push. Builds Windows + macOS +
# Linux bundles with Tauri, produces latest.json from the artifacts, and
# attaches everything to the matching GitHub Release.
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — contents of ~/.tortuga/updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password used at keygen
#
# Optional (for code signing the Windows installer):
#   WINDOWS_CERT_PFX_BASE64            — base64 of an Authenticode .pfx
#   WINDOWS_CERT_PASSWORD              — the .pfx password
#
# Workflow: push a tag `v0.1.2` → CI builds and signs each platform in
# parallel → manifest job consolidates the .sig values into latest.json
# → release job uploads everything to the GitHub Release.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.6.5'

jobs:
  build:
    name: Build (${{ matrix.platform.label }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: windows-latest, label: windows-x86_64, target: '' }
          - { os: macos-latest,   label: darwin-aarch64, target: 'aarch64-apple-darwin' }
          - { os: ubuntu-22.04,   label: linux-x86_64,  target: '' }
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install Linux GTK deps
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build ${{ matrix.platform.target && format('--target {0}', matrix.platform.target) || '' }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.platform.label }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*
            apps/desktop/src-tauri/target/*/release/bundle/**/*
          if-no-files-found: error
          retention-days: 7

  manifest-and-release:
    name: Manifest + GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts-staging

      - name: Consolidate bundles into expected layout
        run: |
          mkdir -p apps/desktop/src-tauri/target/release/bundle
          # The build job uploads with a per-platform root; flatten back so
          # build-manifest.mjs sees its expected nsis/dmg/appimage subdirs.
          find artifacts-staging -type d -name bundle -print | while read d; do
            cp -R "$d"/* apps/desktop/src-tauri/target/release/bundle/ || true
          done
          find apps/desktop/src-tauri/target/release/bundle -maxdepth 2 -type f

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build latest.json
        env:
          TORTUGA_RELEASE_URL_BASE: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
          TORTUGA_RELEASE_NOTES: 'Tortuga OS ${{ github.ref_name }}'
        run: node scripts/build-manifest.mjs

      - name: Collect installers + sigs + manifest
        run: |
          mkdir -p release-out
          find apps/desktop/src-tauri/target/release/bundle -type f \
            \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.sig' \) \
            -exec cp -v {} release-out/ \;
          cp apps/desktop/src-tauri/target/release/bundle/latest.json release-out/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Tortuga OS ${{ steps.ver.outputs.version }}
          body_path: docs/RELEASE.md
          draft: false
          prerelease: false
          files: release-out/*
